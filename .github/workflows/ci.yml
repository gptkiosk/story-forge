# Story Forge CI/CD Pipeline
# GitHub Actions workflow for testing, building, and deploying

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  DOCKER_IMAGE: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/story-forge'
  DOCKER_TAG: '${{ github.sha }}'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Run ruff linter
        run: ruff check . --fix

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.DOCKER_IMAGE }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify:
    name: Verify Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Pull Docker image
        run: docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
      
      - name: Run smoke test
        run: |
          docker run -d --name story-forge-test -p 8888:8080 \
            -e PORT=8080 \
            -e GOOGLE_CLIENT_ID=test \
            -e GOOGLE_CLIENT_SECRET=test \
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          
          # Wait for container to start
          sleep 10
          
          # Check if container is running
          docker ps | grep story-forge-test || { echo "Container failed to start"; docker logs story-forge-test; exit 1; }
          
          # Clean up
          docker stop story-forge-test || true
          docker rm story-forge-test || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.ref == 'refs/heads/develop'
    
    environment:
      name: staging
      url: https://story-forge-staging-${{ secrets.GCP_PROJECT_ID }}.run.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: story-forge-staging
          image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          region: us-central1
          env_vars: |
            ENVIRONMENT=staging
            PORT=8080
          secrets: |
            GOOGLE_CLIENT_ID:latest:story-forge-google-client-id
            GOOGLE_CLIENT_SECRET:latest:story-forge-google-client-secret
            MINIMAX_API_KEY:latest:story-forge-minimax-api-key
            ELEVENLABS_API_KEY:latest:story-forge-elevenlabs-api-key

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://story-forge-${{ secrets.GCP_PROJECT_ID }}.run.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: story-forge
          image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          region: us-central1
          env_vars: |
            ENVIRONMENT=production
            PORT=8080
          secrets: |
            GOOGLE_CLIENT_ID:latest:story-forge-google-client-id
            GOOGLE_CLIENT_SECRET:latest:story-forge-google-client-secret
            MINIMAX_API_KEY:latest:story-forge-minimax-api-key
            ELEVENLABS_API_KEY:latest:story-forge-elevenlabs-api-key
