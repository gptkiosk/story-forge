<!-- Coffee Cup with Steam Line Art - Animated -->
<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cup-stroke {
      fill: none;
      stroke: #C9A96E;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .cup-fill {
      fill: #C9A96E;
      opacity: 0.2;
    }
    @keyframes rise1 {
      0% { transform: translateY(0) scale(1); opacity: 0.4; }
      100% { transform: translateY(-25px) scale(1.5); opacity: 0; }
    }
    @keyframes rise2 {
      0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.4; }
      50% { transform: translateY(-20px) scale(1.3) translateX(2px); opacity: 0.3; }
      100% { transform: translateY(-30px) scale(1.6) translateX(-1px); opacity: 0; }
    }
    @keyframes rise3 {
      0% { transform: translateY(0) scale(1); opacity: 0.3; }
      100% { transform: translateY(-22px) scale(1.4); opacity: 0; }
    }
    .steam1 { animation: rise1 3s ease-out infinite; }
    .steam2 { animation: rise2 3.5s ease-out infinite 0.5s; }
    .steam3 { animation: rise3 2.8s ease-out infinite 1s; }
  </style>
  
  <!-- Cup body -->
  <path d="M25 50 L20 120 Q20 130 35 130 L85 130 Q100 130 100 120 L95 50 Z" class="cup-stroke"/>
  
  <!-- Coffee surface -->
  <ellipse cx="60" cy="50" rx="35" ry="8" class="cup-stroke"/>
  <ellipse cx="60" cy="52" rx="30" ry="5" class="cup-fill"/>
  
  <!-- Cup handle -->
  <path d="M95 60 Q115 60 115 80 Q115 100 95 100" class="cup-stroke"/>
  
  <!-- Saucer -->
  <ellipse cx="60" cy="135" rx="50" ry="8" class="cup-stroke"/>
  
  <!-- Steam wisps -->
  <g class="steam1">
    <path d="M45 40 Q42 30 48 20 Q45 10 50 0" class="cup-stroke" opacity="0.4"/>
  </g>
  <g class="steam2">
    <path d="M60 38 Q63 28 58 18 Q62 8 57 -2" class="cup-stroke" opacity="0.4"/>
  </g>
  <g class="steam3">
    <path d="M75 40 Q72 32 77 22 Q73 12 78 2" class="cup-stroke" opacity="0.4"/>
  </g>
  
  <!-- Decorative ring on cup -->
  <path d="M22 80 Q60 85 98 80" class="cup-stroke" opacity="0.3"/>
  <path d="M20 100 Q60 105 100 100" class="cup-stroke" opacity="0.3"/>
</svg>
