<!-- Typewriter Keys Line Art - Animated -->
<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .key-stroke {
      fill: none;
      stroke: #C9A96E;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .key-fill {
      fill: #C9A96E;
      opacity: 0.15;
    }
    @keyframes keyPress {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(2px); }
    }
    @keyframes gentleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .key-row { animation: gentleBob 4s ease-in-out infinite; }
    .key-row:nth-child(2) { animation-delay: 0.3s; }
    .key-row:nth-child(3) { animation-delay: 0.6s; }
    .key-row:nth-child(4) { animation-delay: 0.9s; }
  </style>
  
  <g class="key-row">
    <!-- Row 1 -->
    <rect x="20" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="22" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="30" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">Q</text>
    
    <rect x="45" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="47" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="55" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">W</text>
    
    <rect x="70" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="72" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="80" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">E</text>
    
    <rect x="95" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="97" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="105" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">R</text>
    
    <rect x="120" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="122" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="130" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">T</text>
    
    <rect x="145" y="10" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="147" y="12" width="16" height="10" rx="2" class="key-fill"/>
    <text x="155" y="21" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">Y</text>
  </g>
  
  <g class="key-row">
    <!-- Row 2 -->
    <rect x="30" y="30" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="32" y="32" width="16" height="10" rx="2" class="key-fill"/>
    <text x="40" y="41" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">A</text>
    
    <rect x="55" y="30" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="57" y="32" width="16" height="10" rx="2" class="key-fill"/>
    <text x="65" y="41" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">S</text>
    
    <rect x="80" y="30" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="82" y="32" width="16" height="10" rx="2" class="key-fill"/>
    <text x="90" y="41" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">D</text>
    
    <rect x="105" y="30" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="107" y="32" width="16" height="10" rx="2" class="key-fill"/>
    <text x="115" y="41" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">F</text>
    
    <rect x="130" y="30" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="132" y="32" width="16" height="10" rx="2" class="key-fill"/>
    <text x="140" y="41" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">G</text>
  </g>
  
  <g class="key-row">
    <!-- Row 3 -->
    <rect x="45" y="50" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="47" y="52" width="16" height="10" rx="2" class="key-fill"/>
    <text x="55" y="61" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">Z</text>
    
    <rect x="70" y="50" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="72" y="52" width="16" height="10" rx="2" class="key-fill"/>
    <text x="80" y="61" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">X</text>
    
    <rect x="95" y="50" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="97" y="52" width="16" height="10" rx="2" class="key-fill"/>
    <text x="105" y="61" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">C</text>
    
    <rect x="120" y="50" width="20" height="16" rx="3" class="key-stroke"/>
    <rect x="122" y="52" width="16" height="10" rx="2" class="key-fill"/>
    <text x="130" y="61" font-family="serif" font-size="8" fill="#C9A96E" text-anchor="middle" opacity="0.6">V</text>
  </g>
  
  <!-- Space bar -->
  <g class="key-row">
    <rect x="40" y="72" width="100" height="16" rx="3" class="key-stroke"/>
    <rect x="42" y="74" width="96" height="10" rx="2" class="key-fill"/>
  </g>
</svg>
