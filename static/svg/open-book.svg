<!-- Open Book Line Art - Animated -->
<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .book-stroke {
      fill: none;
      stroke: #C9A96E;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .book-fill {
      fill: #C9A96E;
      opacity: 0.15;
    }
    @keyframes pageTurn {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(-5deg); }
    }
    @keyframes gentleBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .left-page {
      animation: gentleBreath 5s ease-in-out infinite;
      transform-origin: center right;
    }
    .right-page {
      animation: gentleBreath 5s ease-in-out infinite 0.5s;
      transform-origin: center left;
    }
  </style>
  
  <!-- Book spine curve -->
  <path d="M100 140 Q100 70 100 20" class="book-stroke"/>
  
  <!-- Left page -->
  <g class="left-page">
    <path d="M100 20 Q60 25 30 35 L30 140 Q60 130 100 140 Z" class="book-stroke"/>
    <path d="M30 35 Q60 25 100 20" class="book-fill"/>
    
    <!-- Text lines - left -->
    <path d="M40 50 Q65 48 90 50" class="book-stroke" opacity="0.4"/>
    <path d="M40 60 Q65 58 90 60" class="book-stroke" opacity="0.4"/>
    <path d="M40 70 Q65 68 90 70" class="book-stroke" opacity="0.4"/>
    <path d="M40 80 Q65 78 90 80" class="book-stroke" opacity="0.3"/>
    <path d="M40 90 Q65 88 90 90" class="book-stroke" opacity="0.3"/>
    <path d="M40 100 Q65 98 90 100" class="book-stroke" opacity="0.3"/>
    <path d="M40 110 Q65 108 90 110" class="book-stroke" opacity="0.2"/>
    <path d="M40 120 Q65 118 90 120" class="book-stroke" opacity="0.2"/>
  </g>
  
  <!-- Right page -->
  <g class="right-page">
    <path d="M100 20 Q140 25 170 35 L170 140 Q140 130 100 140 Z" class="book-stroke"/>
    <path d="M170 35 Q140 25 100 20" class="book-fill"/>
    
    <!-- Text lines - right -->
    <path d="M110 50 Q135 48 160 50" class="book-stroke" opacity="0.4"/>
    <path d="M110 60 Q135 58 160 60" class="book-stroke" opacity="0.4"/>
    <path d="M110 70 Q135 68 160 70" class="book-stroke" opacity="0.4"/>
    <path d="M110 80 Q135 78 160 80" class="book-stroke" opacity="0.3"/>
    <path d="M110 90 Q135 88 160 90" class="book-stroke" opacity="0.3"/>
    <path d="M110 100 Q135 98 160 100" class="book-stroke" opacity="0.3"/>
    <path d="M110 110 Q135 108 160 110" class="book-stroke" opacity="0.2"/>
    <path d="M110 120 Q135 118 160 120" class="book-stroke" opacity="0.2"/>
  </g>
  
  <!-- Bookmark ribbon -->
  <path d="M145 25 L145 55 L150 50 L155 55 L155 25" class="book-fill">
    <animate attributeName="d" 
      values="M145 25 L145 55 L150 50 L155 55 L155 25;M145 25 L145 57 L150 52 L155 57 L155 25;M145 25 L145 55 L150 50 L155 55 L155 25" 
      dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Page corners slightly curled -->
  <path d="M30 35 Q28 37 30 40" class="book-stroke" opacity="0.5"/>
  <path d="M170 35 Q172 37 170 40" class="book-stroke" opacity="0.5"/>
</svg>
